<!DOCTYPE html>
<html>
<head>
    <title>Bulma Card</title>

    <!-- Bulma CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
</head>
<body>

<section class="section">
    <div class="container">

        <div class="card" style="max-width: 400px; margin:auto;">
            <div class="card-image">
                <figure class="image is-4by3">
                    <img src="https://er6vkuhix4g.exactdn.com/wp-content/uploads/2025/02/Kylemore-Abbey-and-sourroundings-800x600.jpg?strip=all"
                         alt="Sample Image">
                </figure>
            </div>

            <div class="card-content">
                <p class="title is-4">Nature View</p>
                <p class="content">
                    This is a responsive card created using the Bulma framework.
                    It automatically adjusts to different screen sizes.
                </p>
            </div>
        </div>

    </div>
</section>

</body>
</html>
