<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage  LEVEL 2:TASK 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .container {
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        .box {
            flex: 1;
            background-color: lightblue;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .box {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1 style="text-align:center; padding:20px;">
        Responsive Webpage
    </h1>

    <div class="container">
        <div class="box">Section 1</div>
        <div class="box">Section 2</div>
        <div class="box">Section 3</div>
    </div>

</body>
</html>
