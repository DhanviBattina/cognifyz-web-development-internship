<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Tasks</title>
</head>
<body>

<h2>1. Color Change Button</h2>
<button id="colorBtn" onclick="changeColor()">Click Me</button>

<h2>2. Greeting Alert</h2>
<button onclick="showGreeting()">Show Greeting</button>

<h2>3. Simple Addition Calculator</h2>
<input type="number" id="num1" placeholder="First Number">
<input type="number" id="num2" placeholder="Second Number">
<button onclick="addNumbers()">Add</button>
<p id="result"></p>

<script>
function changeColor() {
    document.getElementById("colorBtn").style.backgroundColor = "red";
}

function showGreeting() {
    let hour = new Date().getHours();

    if (hour < 12)
        alert("Good Morning!");
    else if (hour < 18)
        alert("Good Afternoon!");
    else
        alert("Good Evening!");
}

function addNumbers() {
    let n1 = Number(document.getElementById("num1").value);
    let n2 = Number(document.getElementById("num2").value);

    document.getElementById("result").innerHTML =
        "Result = " + (n1 + n2);
}
</script>

</body>
</html>
