<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        /* Navigation Menu */
        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
        }

        nav a:hover {
            color: yellow;
        }

        /* Content Section */
        .container {
            padding: 20px;
        }

        h1 {
            color: navy;
        }

        p {
            font-size: 18px;
            width: 80%;
            margin: auto;
        }

        img {
            width: 400px;
            margin-top: 20px;
            border-radius: 10px;
        }

        /* Form */
        form {
            margin-top: 30px;
        }

        input[type="text"] {
            padding: 10px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            background-color: navy;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Heading, Paragraph and Image -->
    <div class="container">
        <h1>COGNIFYZ</h1>

        <p>
           Enter your name to continue for cognifyz intership       </p>

        <img src="https://cognifyz.com/wp-content/uploads/2025/09/Untitled-design-22.webp" alt="COGNIFYZ">

        <!-- Simple Form -->
        <form>
            <h2>Contact Form</h2>
            <input type="text" placeholder="Enter your name">
            <input type="submit" value="Submit">
        </form>
    </div>

</body>
</html>
